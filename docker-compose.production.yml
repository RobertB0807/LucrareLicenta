name: cyber-training

x-api-environment: &api-environment
  APP_ENV: production
  AUTO_MIGRATE: "false"
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
  TRUST_PROXY_HEADERS: "false"
  RATE_LIMIT_FAIL_OPEN: "false"
  API_DOCS_ENABLED: "false"
  LOG_LEVEL: INFO
  LOG_JSON: "true"
  METRICS_ENABLED: "true"
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
  FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
  LLM_ENABLED: ${LLM_ENABLED:-false}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
  LIVE_DRILL_PUBLIC_BASE_URL: ${LIVE_DRILL_PUBLIC_BASE_URL:-http://127.0.0.1:8000}
  LIVE_DRILL_EMAIL_ENABLED: ${LIVE_DRILL_EMAIL_ENABLED:-false}
  LIVE_DRILL_SMTP_HOST: ${LIVE_DRILL_SMTP_HOST:-}
  LIVE_DRILL_SMTP_PORT: ${LIVE_DRILL_SMTP_PORT:-587}
  LIVE_DRILL_SMTP_USERNAME: ${LIVE_DRILL_SMTP_USERNAME:-}
  LIVE_DRILL_SMTP_PASSWORD: ${LIVE_DRILL_SMTP_PASSWORD:-}
  LIVE_DRILL_SMTP_TLS: ${LIVE_DRILL_SMTP_TLS:-true}
  LIVE_DRILL_EMAIL_FROM: ${LIVE_DRILL_EMAIL_FROM:-}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - backend

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - backend

  migrate:
    build:
      context: ./BackendAPI
    environment:
      <<: *api-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  api:
    build:
      context: ./BackendAPI
    restart: unless-stopped
    environment:
      <<: *api-environment
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "${API_WORKERS:-1}",
        "--no-proxy-headers",
        "--no-access-log"
      ]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres-data:
  redis-data:
  prometheus-data:

networks:
  backend:
    driver: bridge
