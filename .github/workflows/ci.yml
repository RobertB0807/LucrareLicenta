name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackendAPI
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:////tmp/cyber-training-ci.db
      JWT_SECRET_KEY: ci-only-secret-that-is-longer-than-thirty-two-characters
      LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BackendAPI/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -p "test_*.py" -q

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cyber_training_test
          POSTGRES_USER: cyber_training
          POSTGRES_PASSWORD: cyber_training_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyber_training -d cyber_training_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    defaults:
      run:
        working-directory: BackendAPI
    env:
      APP_ENV: test
      AUTO_MIGRATE: "false"
      DATABASE_URL: postgresql+psycopg://cyber_training:cyber_training_test_password@127.0.0.1:5432/cyber_training_test
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET_KEY: ci-only-secret-that-is-longer-than-thirty-two-characters
      LLM_ENABLED: "false"
      RUN_POSTGRES_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BackendAPI/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m unittest discover -s tests -p "test_postgres_integration.py" -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CyberSecurityApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: CyberSecurityApp/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx expo export --platform web --output-dir /tmp/cybersecurityapp-web
